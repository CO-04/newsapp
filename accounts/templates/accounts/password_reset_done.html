{% extends "base.html" %}

{% block title %}Reset Link Sent – NewsApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-3">Check Your Email</h2>

        <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary">Back to Login</a>
    </div>
</div>
{% endblock %}
