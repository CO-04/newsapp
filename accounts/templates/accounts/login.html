{% extends "base.html" %}

{% block title %}Login – NewsApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <h2 class="mb-4">Login</h2>

        <form method="post" novalidate>
            {% csrf_token %}

            <div class="mb-3">
                <label for="id_username" class="form-label fw-semibold">Username</label>
                <input type="text" id="id_username" name="username"
                       class="form-control" required autofocus>
            </div>

            <div class="mb-3">
                <label for="id_password" class="form-label fw-semibold">Password</label>
                <input type="password" id="id_password" name="password"
                       class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <p class="mt-3 text-center">
            <a href="{% url 'accounts:password_reset' %}">Forgot your password?</a>
        </p>
        <p class="text-center">
            Don't have an account?
            <a href="{% url 'accounts:register' %}">Register &rarr;</a>
        </p>
    </div>
</div>
{% endblock %}
